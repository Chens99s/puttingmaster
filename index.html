<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PuttingMaster Challenge</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            font-family: 'Montserrat', sans-serif; 
            -webkit-text-size-adjust: 100%;
        }
        .putt-box { 
            transition: all 0.1s ease; 
            touch-action: manipulation; 
        }
        * { -webkit-tap-highlight-color: transparent; }
        
        /* Brand Colors */
        .text-brand-red { color: #D40610; }
        .bg-brand-red { background-color: #D40610; }
        .border-brand-red { border-color: #D40610; }
        
        /* Italic Slant Fix */
        .italic-slant-fix {
            padding-right: 0.2em;
            margin-right: -0.2em;
        }

        /* Mobile specific adjustments */
        @media (max-width: 480px) {
            .putt-box {
                width: 1.6rem;
                height: 1.6rem;
            }
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen pb-20 select-none">

    <div class="max-w-xl mx-auto p-4">
        <header class="flex justify-between items-start mb-10 pt-6">
            <div class="flex flex-col gap-2">
                <img src="Logo%20Horizonat%20Negative%20Trademark.png" 
                     alt="PuttingMaster Logo" 
                     class="h-12 w-auto object-contain self-start">
                <p class="text-brand-red text-[16px] uppercase tracking-[0.4em] font-bold ml-1">CHALLENGE</p>
            </div>
            <button onclick="resetScoresOnly()" class="bg-slate-800 text-[#F2F2F2] text-[9px] px-3 py-2 rounded-full uppercase font-bold border border-slate-700 mt-2 active:bg-slate-700 transition-colors">Reset Scores</button>
        </header>

        <div class="flex flex-col sm:flex-row gap-2 mb-10 bg-slate-900/50 p-2 rounded-2xl border border-slate-800 shadow-inner">
            <input id="playerName" type="text" placeholder="PLAYER NAME..." 
                onkeydown="if(event.key === 'Enter') addPlayer()"
                class="flex-grow p-4 rounded-xl bg-slate-800 border-none text-white focus:ring-2 focus:ring-brand-red outline-none font-bold placeholder:text-slate-700 uppercase">
            <button onclick="addPlayer()" class="bg-brand-red hover:brightness-110 px-8 py-4 sm:py-0 rounded-xl font-black text-white transition-all active:scale-95 text-xl shadow-lg">ADD</button>
        </div>

        <div id="playersList" class="space-y-12"></div>
    </div>

    <script>
        let players = JSON.parse(localStorage.getItem('pm_v7_data')) || [];

        function save() {
            localStorage.setItem('pm_v7_data', JSON.stringify(players));
        }

        function addPlayer() {
            const nameInput = document.getElementById('playerName');
            const name = nameInput.value.trim();
            if (!name) return;
            
            players.push({
                id: Date.now(),
                name: name,
                j316: Array(5).fill(0).map(() => [0, 0, 0]),
                reg: Array(5).fill(0).map(() => [0, 0, 0])
            });
            nameInput.value = '';
            save();
            render();
        }

        function togglePutt(playerId, type, holeIndex, puttIndex) {
            const player = players.find(p => p.id === playerId);
            if (player) {
                player[type][holeIndex][puttIndex] = player[type][holeIndex][puttIndex] === 0 ? 1 : 0;
                save();
                render();
            }
        }

        function editName(id) {
            const player = players.find(p => p.id === id);
            const newName = prompt("Edit Player Name (Clear name to delete player):", player.name);
            if (newName === "") {
                players = players.filter(p => p.id !== id);
            } else if (newName !== null) {
                player.name = newName.trim();
            }
            save();
            render();
        }

        function resetScoresOnly() {
            if(confirm("Clear all scores? Player names will be saved.")) {
                players.forEach(p => {
                    p.j316 = Array(5).fill(0).map(() => [0, 0, 0]);
                    p.reg = Array(5).fill(0).map(() => [0, 0, 0]);
                });
                save();
                render();
            }
        }

        function render() {
            const container = document.getElementById('playersList');
            container.innerHTML = '';

            players.forEach(player => {
                let jGrandTotal = 0;
                let rGrandTotal = 0;

                let holeRows = '';
                for(let i=0; i<5; i++) {
                    const hJCount = player.j316[i].filter(s => s === 1).length;
                    const hRCount = player.reg[i].filter(s => s === 1).length;
                    jGrandTotal += hJCount;
                    rGrandTotal += hRCount;

                    holeRows += `
                        <div class="grid grid-cols-12 items-center border-t border-slate-800/50 py-4 px-1">
                            <div class="col-span-1 text-[10px] font-black text-slate-500 italic uppercase ml-1">${i+1}</div>
                            
                            <div class="col-span-4 flex gap-1 justify-center">
                                ${player.j316[i].map((state, pIdx) => `
                                    <div onclick="togglePutt(${player.id}, 'j316', ${i}, ${pIdx})" 
                                         class="putt-box w-7 h-7 sm:w-8 sm:h-8 rounded-md border-2 ${state === 1 ? 'bg-green-500 border-green-400 shadow-[0_0_10px_rgba(34,197,94,0.3)]' : 'bg-red-500/10 border-red-500/20'}">
                                    </div>
                                `).join('')}
                            </div>
                            <div class="col-span-1 text-center font-black text-xl text-white italic">${hJCount}</div>
                            
                            <div class="col-span-1 border-l border-slate-800 h-6 mx-auto"></div>

                            <div class="col-span-4 flex gap-1 justify-center">
                                ${player.reg[i].map((state, pIdx) => `
                                    <div onclick="togglePutt(${player.id}, 'reg', ${i}, ${pIdx})" 
                                         class="putt-box w-7 h-7 sm:w-8 sm:h-8 rounded-md border-2 ${state === 1 ? 'bg-green-500 border-green-400 shadow-[0_0_10px_rgba(34,197,94,0.3)]' : 'bg-slate-800/40 border-slate-700/60'}">
                                    </div>
                                `).join('')}
                            </div>
                            <div class="col-span-1 text-center font-black text-xl text-white italic">${hRCount}</div>
                        </div>
                    `;
                }

                const card = document.createElement('div');
                card.className = "bg-slate-900 rounded-3xl border border-slate-800 shadow-2xl overflow-hidden";
                card.innerHTML = `
                    <div class="bg-slate-800/40 p-5 flex justify-between items-center border-b border-slate-700 overflow-visible">
                        <div class="overflow-visible flex-grow">
                            <h2 class="text-2xl font-black text-white italic tracking-tight uppercase italic-slant-fix">${player.name}</h2>
                        </div>
                        <button onclick="editName(${player.id})" class="bg-brand-red hover:brightness-110 text-white text-[9px] px-3 py-1.5 rounded font-bold uppercase tracking-widest transition-all active:scale-95 shrink-0 ml-4">Edit</button>
                    </div>
                    
                    <div class="w-full">
                        <div class="grid grid-cols-12 text-[8px] font-black uppercase tracking-widest text-slate-500 py-3 text-center">
                            <div class="col-span-1 px-2">#</div>
                            <div class="col-span-4">J316</div>
                            <div class="col-span-1">TOT</div>
                            <div class="col-span-1"></div>
                            <div class="col-span-4 uppercase">Regulation</div>
                            <div class="col-span-1">TOT</div>
                        </div>
                        
                        <div>${holeRows}</div>
                        
                        <div class="bg-slate-800/50 border-t-2 border-slate-700">
                            <div class="flex divide-x divide-slate-800">
                                <div class="flex-1 p-5 text-center">
                                    <span class="text-[8px] block text-slate-500 uppercase font-black tracking-widest mb-1">J316 Total</span>
                                    <span class="text-4xl font-black text-white italic italic-slant-fix">${jGrandTotal}</span>
                                </div>
                                <div class="flex-1 p-5 text-center">
                                    <span class="text-[8px] block text-slate-500 uppercase font-black tracking-widest mb-1">REG Total</span>
                                    <span class="text-4xl font-black text-white italic italic-slant-fix">${rGrandTotal}</span>
                                </div>
                            </div>
                            <div class="bg-brand-red p-8 text-center shadow-[inset_0_2px_15px_rgba(0,0,0,0.4)]">
                                <div class="text-[10px] font-black text-white uppercase tracking-[0.5em] mb-2 opacity-90">Combined Score</div>
                                <div class="font-black text-white text-7xl italic leading-none italic-slant-fix">${jGrandTotal + rGrandTotal}</div>
                            </div>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        render();
    </script>
</body>
</html>
